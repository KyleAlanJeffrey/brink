# Mosquitto config for the Pi-as-broker setup.
# Installed to /etc/mosquitto/conf.d/local.conf by install_service.sh.
#
# Makes the broker reachable on the LAN so a separate Home Assistant box can
# connect (default Mosquitto only listens on localhost).

listener 1883 0.0.0.0

# Testing only: no auth. Before leaving a trusted LAN, comment this out and add
# a password file:
#   sudo mosquitto_passwd -c /etc/mosquitto/passwd <username>
#   then below:  allow_anonymous false
#                password_file /etc/mosquitto/passwd
allow_anonymous true
